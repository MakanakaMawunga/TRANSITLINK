{% extends "base.html" %}

{% block content %}
<section class="content-card narrow-card">
    <h2>TransitLink AI Chat</h2>
    <p>Ask about accessibility, saved places, delays, or frequent journeys.</p>

    <form method="POST" class="stacked-form">
        <textarea name="message" rows="5" placeholder="Ask about accessible routes, home, work, school, shopping, or delays...">{{ user_message }}</textarea>
        <button type="submit">Send</button>
    </form>

    {% if reply %}
    <div class="chat-reply">
        <h4>TransitLink Assistant</h4>
        <p>{{ reply }}</p>
    </div>
    {% endif %}
</section>
{% endblock %}
