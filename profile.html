{% extends "base.html" %}

{% block content %}
<section class="content-card narrow-card">
    <h2>Profile and Accessibility Preferences</h2>
    <p>Save your needs and frequent destinations so the app can tailor routes to you.</p>

    <form method="POST" class="stacked-form">
        <input type="text" name="name" value="{{ profile.name }}" placeholder="Full name">
        <input type="email" name="email" value="{{ profile.email }}" placeholder="Email address">

        <label><input type="checkbox" name="wheelchair_access" {% if profile.wheelchair_access %}checked{% endif %}> Wheelchair access needed</label>
        <label><input type="checkbox" name="step_free" {% if profile.step_free %}checked{% endif %}> Step-free access needed</label>
        <label><input type="checkbox" name="audio_announcements" {% if profile.audio_announcements %}checked{% endif %}> Audio announcements preferred</label>
        <label><input type="checkbox" name="priority_seating" {% if profile.priority_seating %}checked{% endif %}> Priority seating needed</label>

        <input type="text" name="home_location" value="{{ profile.home_location }}" placeholder="Home">
        <input type="text" name="work_location" value="{{ profile.work_location }}" placeholder="Work">
        <input type="text" name="school_location" value="{{ profile.school_location }}" placeholder="School">
        <input type="text" name="shopping_location" value="{{ profile.shopping_location }}" placeholder="Shopping">

        <button type="submit">Save Profile</button>
    </form>

    {% if message %}
    <p class="success-text">{{ message }}</p>
    {% endif %}
</section>
{% endblock %}
