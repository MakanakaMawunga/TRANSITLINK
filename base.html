<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TransitLink</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <header class="topbar">
        <div class="brand-wrap">
            <img src="{{ url_for('static', filename='logo.jpeg') }}" alt="TransitLink logo" class="logo">
            <div>
                <h1 class="brand-name">TransitLink</h1>
                <p class="brand-tag">Smart travel made simple</p>
            </div>
        </div>

        <nav class="nav-links">
            <a href="{{ url_for('home') }}">Home</a>
            <a href="{{ url_for('routes_page') }}">Routes</a>
            <a href="{{ url_for('chatbot') }}">AI Chat</a>
            <a href="{{ url_for('feedback') }}">Feedback</a>
            <a href="{{ url_for('login') }}">Log In</a>
            <a href="{{ url_for('signup') }}" class="nav-button">Sign Up</a>
        </nav>
    </header>

    <main class="page-shell">
        {% block content %}{% endblock %}
    </main>

    <footer class="footer">
        <div class="footer-links">
            <a href="#">Instagram</a>
            <a href="#">TikTok</a>
            <a href="#">LinkedIn</a>
            <a href="#">X</a>
        </div>
        <p>© 2026 TransitLink. Built for smarter local transport planning.</p>
    </footer>
</body>
</html>
